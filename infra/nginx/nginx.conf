# Install as /etc/nginx/sites-available/ptt.vinrul.my.id.conf and enable it
# from /etc/nginx/sites-enabled. The Cloudflare DNS record must be proxied.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream ptt_fleet_app {
    server 127.0.0.1:9910;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name ptt.vinrul.my.id;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name ptt.vinrul.my.id;

    ssl_certificate     /etc/ssl/vinrul_my_id_cert.pem;
    ssl_certificate_key /etc/ssl/vinrul_my_id_key.pem;

    # Cloudflare Authenticated Origin Pull certificate.
    ssl_client_certificate /etc/ssl/cloudflare.crt;
    ssl_verify_client on;
    ssl_verify_depth 1;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:PTTFleetSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 10m;

    location /ws {
        proxy_pass http://ptt_fleet_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://ptt_fleet_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
