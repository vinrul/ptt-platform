# Install as /etc/nginx/sites-available/ptt-dispatcher.vinrul.my.id.conf.
# The Cloudflare DNS record must be proxied.

server {
    listen 80;
    listen [::]:80;
    server_name ptt-dispatcher.vinrul.my.id;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name ptt-dispatcher.vinrul.my.id;
    root /var/www/dist-ptt-fleet;
    index index.html;

    ssl_certificate     /etc/ssl/vinrul_my_id_cert.pem;
    ssl_certificate_key /etc/ssl/vinrul_my_id_key.pem;

    # Cloudflare Authenticated Origin Pull certificate.
    ssl_client_certificate /etc/ssl/cloudflare.crt;
    ssl_verify_client on;
    ssl_verify_depth 1;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:PTTDispatcherSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
