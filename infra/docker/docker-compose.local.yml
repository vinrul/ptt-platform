name: ptt-fleet-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: ptt-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ptt_fleet}
      POSTGRES_USER: ${POSTGRES_USER:-ptt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ptt}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ptt} -d ${POSTGRES_DB:-ptt_fleet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ptt-redis-local
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgweb:
    image: sosedoff/pgweb:0.16.2
    container_name: ptt-pgweb-local
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-ptt}:${POSTGRES_PASSWORD:-ptt}@postgres:5432/${POSTGRES_DB:-ptt_fleet}?sslmode=disable
    ports:
      - "${PGWEB_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy

  api-server:
    profiles: ["app"]
    build:
      context: ../../services/api-server
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      API_PORT: ${API_PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-ptt}:${POSTGRES_PASSWORD:-ptt}@postgres:5432/${POSTGRES_DB:-ptt_fleet}?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES:-15}
      JWT_REFRESH_TTL_HOURS: ${JWT_REFRESH_TTL_HOURS:-720}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-127.0.0.1,::1}
      LOGIN_RATE_LIMIT: ${LOGIN_RATE_LIMIT:-10}
      LOGIN_RATE_WINDOW_SECONDS: ${LOGIN_RATE_WINDOW_SECONDS:-60}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dispatcher-web:
    profiles: ["app"]
    build:
      context: ../../apps/dispatcher-web
      dockerfile: Dockerfile
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
      PUBLIC_WS_URL: ${PUBLIC_WS_URL:-ws://localhost:8080/ws}
    ports:
      - "5173:5173"
    depends_on:
      - api-server

volumes:
  postgres_data:
  redis_data:
